# TestBatch: one big collection over test directory (subset=100 each)
paths:
  results_dir: "eval/outputs"

weak_supply:
  # Provider can be 'blending' (default) or 'diffusion_detector'/'diffdet' (unified style). Legacy: 'diffusion'/'aligner'
  provider: blending
  model_name: "swinv2_base_window16_256"
  weights_path: "weights/blending_models/best_gf.pth"
  alias: "Blending"
  img_size: 256
  num_class: 2
  batch_size: 128
  num_workers: 8
  pin_memory: true

  # To switch to diffusion/aligner expert, minimally change to:
  provider: diffusion_detector
  alias: Diffusion
  # NOTE: fix path typo — must be 'weights/', not 'weight/'.
  weights_dir: weights/
  model: ours-sync
  # (model_name/weights_path/img_size/num_class are ignored for diffusion_detector)

# Preferred multi-expert path (mirrors training). When present, runner uses this
# instead of single weak_supply, and will build the shared multi-expert tail.
weak_supplies:
  - provider: blending
    alias: Blending
    model_name: swinv2_base_window16_256
    weights_path: weights/blending_models/best_gf.pth
    img_size: 256
    num_class: 2
    batch_size: 128
    num_workers: 8
    pin_memory: true
    thresholds: { lo: 0.30, hi: 0.70 }

  # - provider: diffusion_detector
  #   alias: Diffusion
  #   weights_dir: weights/
  #   model: ours-sync
  #   # Reduce batch size to avoid CUDA pooling issues with fp16 on large inputs
  #   batch_size: 32
  #   num_workers: 8
  #   pin_memory: true
  #   thresholds: { lo: 0.30, hi: 0.70 }

model:
  base: "weights/base/llava-v1.5-7b"
  # Use the LoRA adapter that actually exists in this repo
  adapter: "weights/checkpoints/ckpt/llava-v1.5-7b-lora-[x2dfdble]"

