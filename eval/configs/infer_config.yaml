# Sane default eval config for public release.
#
# This version uses only the tiny JSONs inside the repo (datasets/raw/data/test/Tiny_Test)
# so `./test.sh` runs quickly. For a larger evaluation, copy this file to
# `infer_config.example.yaml` and replace `infer.inputs` with your dataset JSONs
# or use environment variables like ${X2DFD_DATASETS} (runner will expand env vars).

paths:
  results_dir: "eval/outputs"

# Multi-expert path (mirrors training). Runner will use this list to build the
# shared question tail with multiple expert scores.
weak_supplies:
  - provider: blending
    alias: Blending
    model_name: swinv2_base_window16_256
    weights_path: weights/blending_models/best_gf.pth
    img_size: 256
    num_class: 2
    batch_size: 128
    num_workers: 8
    pin_memory: true
    thresholds: { lo: 0.30, hi: 0.70 }

  - provider: diffusion_detector
    alias: Diffusion
    weights_dir: weights/
    model: ours-sync
    batch_size: 32
    num_workers: 8
    pin_memory: true
    thresholds: { lo: 0.30, hi: 0.70 }

model:
  base: "weights/base/llava-v1.5-7b"
  adapter: "weights/checkpoints/ckpt/llava-v1.5-7b-lora-[ble-diff]"

infer:
  inputs:
    - "datasets/raw/data/test/Tiny_Test/DFDCP_real.json"
    - "datasets/raw/data/test/Tiny_Test/DFDCP_fake.json"
    - "datasets/raw/data/test/Tiny_Test/DFDC_real.json"
    - "datasets/raw/data/test/Tiny_Test/DFDC_fake.json"
  question_template: "<image>\nIs this image real or fake? And the {alias} score is {score}."
  temperature: 0.0
  top_p: 1.0
  num_beams: 1
  max_new_tokens: 4
