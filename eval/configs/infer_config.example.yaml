"""
Example large-scale eval config.

Usage:
- Set X2DFD_DATASETS to your datasets root (absolute), e.g.:
    export X2DFD_DATASETS=/abs/path/to/datasets/raw/data/test
- Then run:
    python -m eval.infer.runner --config eval/configs/infer_config.example.yaml

Notes:
- The runner expands ${VARS} in paths.
- You can also mix absolute and repo-relative paths.
"""

paths:
  results_dir: "eval/outputs"

weak_supplies:
  - provider: blending
    alias: Blending
    model_name: swinv2_base_window16_256
    weights_path: weights/blending_models/best_gf.pth
    img_size: 256
    num_class: 2
    batch_size: 128
    num_workers: 8
    pin_memory: true
    thresholds: { lo: 0.30, hi: 0.70 }

  - provider: diffusion_detector
    alias: Diffusion
    weights_dir: weights/
    model: ours-sync
    batch_size: 32
    num_workers: 8
    pin_memory: true
    thresholds: { lo: 0.30, hi: 0.70 }

model:
  base: "weights/base/llava-v1.5-7b"
  adapter: "weights/checkpoints/ckpt/llava-v1.5-7b-lora-[x2dfdfinal]"

infer:
  inputs:
    # Tiny quick sanity set inside the repo (always available)
    - "datasets/raw/data/test/Tiny_Test/DFDC_real.json"
    - "datasets/raw/data/test/Tiny_Test/DFDC_fake.json"

    # Examples referencing external datasets via env var
    - "${X2DFD_DATASETS}/Celeb-DF-v2/Celeb_real.json"
    - "${X2DFD_DATASETS}/Celeb-DF-v2/Celeb_fake.json"
    - "${X2DFD_DATASETS}/DIFF/T2I/SDXL_fake.json"

  question_template: "<image>\nIs this image real or fake? And the {alias} score is {score}."
  temperature: 0.2
  top_p: 1.0
  num_beams: 1
  max_new_tokens: 4

