# Unified configuration for the end-to-end pipeline (base QA -> LoRA train -> LoRA test)

paths:
  # Root folder for training dataset JSONs (used by train.sh)
  data_dir: "/data/250010183/workspace/X2DFD/datasets/raw/data/train"
  # Root folder for all pipeline outputs (annotations, merged data, ckpts)
  results_dir: "train/outputs"

# Base-model prompt and training annotation sources
annotations:
  # Prompt template used to generate explanations for training annotations
  prompt_file: "datasets/prompts/prompt.json"
  # Base LLaVA model for generating explanations (and as the LoRA base)
  model_path: "weights/base/llava-v1.5-7b"
  # Training dataset JSONs (located under paths.data_dir)
  real_files: [Real.json]
  fake_files: [Deepfakes.json, Face2Face.json, FaceSwap.json, NeuralTextures.json]

# Traditional detector used to compute blending scores for templated questions
weak_supply:
  model_name: "swinv2_base_window16_256"
  weights_path: "weights/blending_models/best_gf.pth"
  alias: "Blending"
  img_size: 256
  num_class: 2
  # Batched inference tuning for detector
  batch_size: 128
  num_workers: 8
  pin_memory: true

# Model paths for quick/LoRA inference
model:
  base: "weights/base/llava-v1.5-7b"
  # Optional: path to an existing LoRA adapter (testing); overridden by training output if training runs
  adapter: "weights/checkpoints/ckpt/llava-v1.5-7b-lora-[x2dfd]"

# Inference settings for quick/LoRA testing
infer:
  # Test JSONs (test.sh also points to the test directory)
  inputs:
    - "/data/250010183/workspace/X2DFD/datasets/raw/data/test/Real.json"
    - "/data/250010183/workspace/X2DFD/datasets/raw/data/test/Deepfakes_tiny.json"
    - "/data/250010183/workspace/X2DFD/datasets/raw/data/test/Faceswap_tiny.json"
  # Question template with score placeholders used during testing
  question_template: "<image>\nIs this image real or fake? And by observation of {alias} expert, the blending score is {score}."
  # Generation parameters
  temperature: 0.2
  top_p: 1.0
  num_beams: 1
  max_new_tokens: 512

# Pipeline execution toggles
pipeline:
  # When true, skip annotation/merge/training and only perform LoRA testing
  test_only: false

# Optional training defaults (for reference; pipeline_unified CLI flags take precedence)
training:
  run_train: true
  # GPUs to include for DeepSpeed launcher (comma-separated indices)
  gpus: "0"
  deepspeed_config: null
  # Where to save LoRA adapter when training is enabled
  output_dir: "weights/checkpoints/ckpt/FR/llava-v1.5-7b-lora-[small]"
  # Per-dataset caps (optional)
  max_train_items: null
  max_test_items: null
  # Vision tower required for training to set image_processor
  vision_tower: "weights/base/clip-vit-large-patch14-336"
  # Optional: common MM + training knobs with safe defaults (can be tuned)
  mm_projector_type: mlp2x_gelu
  mm_vision_select_layer: -2
  mm_use_im_start_end: false
  mm_use_im_patch_token: false
  image_aspect_ratio: pad
  group_by_modality_length: true
  lora_r: 16
  lora_alpha: 32
  mm_projector_lr: 2e-5
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  dataloader_num_workers: 4
  model_max_length: 2048
  learning_rate: 2e-4
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  logging_steps: 1
