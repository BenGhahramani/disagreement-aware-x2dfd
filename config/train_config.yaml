# Central training config for stepwise pipeline (annotation/weak/train).

paths:
  # Root folder for training dataset JSONs
  data_dir: "/data/250010183/workspace/X2DFD/datasets/raw/data/train"
  # All pipeline outputs under logs/steps
  results_dir: "logs/steps"

annotations:
  # Prompt template for generating explanations
  prompt_file: "datasets/prompts/prompt.json"
  # Base LLaVA model
  model_path: "weights/base/llava-v1.5-7b"
  # Training dataset JSONs (relative to paths.data_dir)
  real_files: [Real.json]
  fake_files: [Deepfakes.json, Face2Face.json, FaceSwap.json, NeuralTextures.json, DiffFace.json]

# Multi-expert weak supplies (used by step3 and question templating)
weak_supplies:
  - provider: blending
    alias: Blending
    model_name: swinv2_base_window16_256
    weights_path: weights/blending_models/best_gf.pth
    img_size: 256
    num_class: 2
    batch_size: 128
    num_workers: 8
    pin_memory: true
    thresholds: { lo: 0.30, hi: 0.70 }

  - provider: diffusion_detector
    alias: Diffusion
    weights_dir: weights/
    model: ours-sync
    batch_size: 32
    num_workers: 8
    pin_memory: true
    thresholds: { lo: 0.30, hi: 0.70 }

model:
  base: "weights/base/llava-v1.5-7b"
  adapter: ""

infer:
  # Shared question template for weak merge / tests
  question_template: "<image>\nIs this image real or fake? And the {alias} score is {score}."
  temperature: 0.2
  top_p: 1.0
  num_beams: 1
  max_new_tokens: 4

pipeline:
  test_only: false

training:
  run_train: true
  gpus: "0"
  deepspeed_config: null
  output_dir: "logs/steps/ckpt/llava-v1.5-7b-lora-[x2dfd]"
  max_train_items: null
  max_test_items: null
  vision_tower: "weights/base/clip-vit-large-patch14-336"
  mm_projector_type: mlp2x_gelu
  mm_vision_select_layer: -2
  mm_use_im_start_end: false
  mm_use_im_patch_token: false
  image_aspect_ratio: pad
  group_by_modality_length: true
  lora_r: 16
  lora_alpha: 32
  mm_projector_lr: 2e-5
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  dataloader_num_workers: 4
  model_max_length: 2048
  learning_rate: 2e-4
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  logging_steps: 1
  gradient_checkpointing: false
  ddp_find_unused_parameters: false
  report_to: none

